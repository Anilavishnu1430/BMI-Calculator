<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI</title>
  <!-- bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</head>

<body>

  <div class="container-fluid vh-100 d-flex justify-content-center align-items-center" style="background-image: url('https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b');
            background-size: cover;
            background-position: center;">

    <div class="card shadow p-4" style="width: 400px; background-color: rgba(0, 0, 0, 0.75);">

      <h2 class="text-center text-white mb-4">
        BMI Calculator
      </h2>

      <div class="mb-3">
        <label class="form-label text-light">Height (cm)</label>
        <input id="height" type="number" title="height" class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label text-light">Weight (kg)</label>
        <input id="weight" type="number" title="weight" class="form-control">
      </div>

      <div class="d-grid">
        <button onclick="btnClick()" class="btn btn-dark border border-light">
          Calculate BMI
        </button>
      </div>

      <h4 id="result" class="text-center mt-3 text-light"></h4>

    </div>
  </div>
  </div>



  <script>
    function btnClick() {
      let userheight = document.getElementById("height").value;
      console.log(userheight);
      let userweight = document.getElementById("weight").value;
      console.log(userweight);
      let bmi = userweight / (userheight / 100 * userheight / 100);
      alert("Calculated Results: " + bmi);
    }
  </script>

</body>
